version = "1.0"

[metadata]
author_name = "sci-swe"
author_email = "sci-swe@example.com"
difficulty = "hard"                     # 所有项目均为 hard（多文件挖空/bug）
category = "algorithm"                  # 算法/科学计算
tags = ["multi-file", "optimization", "<algorithm-name>"]
expert_time_estimate_min = 180.0
junior_time_estimate_min = 360.0

[verifier]
timeout_sec = 3000.0                    # 30 分钟验证超时

[agent]
timeout_sec = 3000.0                    # 30 分钟 Agent 运行超时

[environment]
build_timeout_sec = 300.0
docker_image = "python:3.10-slim"       # 统一使用 Python 3.10
cpus = 2
memory = "4G"
storage = "2G"